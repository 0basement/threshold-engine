# Minimal single-process Mimir configuration for local development.
# All data is stored on disk under /data/mimir.
target: all,overrides-exporter

multitenancy_enabled: false

server:
  http_listen_port: 9009

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb

compactor:
  data_dir: /data/mimir/compactor

store_gateway:
  sharding_ring:
    replication_factor: 1

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
    replication_factor: 1

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/rules

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir/common
